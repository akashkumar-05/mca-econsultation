spring.application.name=econsultation
logging.level.com.mca=DEBUG
server.port=8080

# The "Ultimate Direct" DB Configuration
spring.datasource.url=${FINAL_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Service Configuration (Distributed)
ai.service.url=${AI_SERVICE_URL:https://aksh053712-mca-ai-service.hf.space}

# Storage Paths
upload.path=${UPLOAD_PATH:./uploads/}
output.path=${OUTPUT_PATH:./src/main/resources/static/}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_CLIENT_ID_HERE}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_SECRET_HERE}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=name
