<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCA AI Playground — Developer Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .logo span { color: var(--accent); }

        .system-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-pill {
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Main Layout */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Input Area */
        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Results Area */
        .results-container {
            margin-top: 32px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .result-section:last-child { border-bottom: none; }

        .sentiment-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            text-transform: capitalize;
        }

        .sentiment-positive { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .sentiment-neutral { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .sentiment-negative { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .confidence-meter {
            margin-top: 16px;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }

        .confidence-fill {
            height: 100%;
            background: var(--accent);
            width: 0;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .summary-text {
            line-height: 1.8;
            color: var(--text-dim);
            font-size: 16px;
            font-style: italic;
        }

        /* Explainability Tokens */
        .explanation-tokens {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .token {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            cursor: default;
        }

        /* Sidebar Info */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stat-label { color: var(--text-dim); }
        .stat-value { font-weight: 700; color: var(--accent); }

        /* Loader */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">AI</div>
            MCA <span>Microservice</span>
        </div>
        <div class="system-status">
            <div class="status-pill">
                <div class="dot"></div>
                v2.0 Online
            </div>
            <div class="status-pill" id="device-pill">
                CPU Mode
            </div>
        </div>
    </header>

    <main>
        <div class="content">
            <div class="card">
                <h2>🧪 Model Playground</h2>
                <div class="input-group">
                    <label>Enter stakeholder comment or policy text</label>
                    <textarea id="inputText" placeholder="Example: The new environmental policy for companies is a step in the right direction, but the implementation timeline is far too aggressive and might cause operational chaos."></textarea>
                </div>
                <div class="actions">
                    <button class="btn-primary" onclick="analyze()">
                        <div class="loader" id="analyze-loader"></div>
                        🚀 Run Full Analysis
                    </button>
                    <button class="btn-secondary" onclick="clearInput()">🗑 Clear</button>
                </div>

                <div class="results-container" id="results">
                    <div class="result-section">
                        <label>Sentiment Prediction</label>
                        <div id="sentiment-output"></div>
                        <div class="confidence-meter">
                            <div class="confidence-fill" id="conf-fill"></div>
                        </div>
                        <p id="conf-text" style="font-size: 12px; margin-top: 8px; color: var(--text-dim)"></p>
                    </div>

                    <div class="result-section">
                        <label>AI Explanation (Attention Maps)</label>
                        <div class="explanation-tokens" id="explanation-output"></div>
                    </div>

                    <div class="result-section">
                        <label>Abstractive Summary (BART)</label>
                        <p class="summary-text" id="summary-output"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3 style="font-size: 16px; margin-bottom: 20px;">📟 System Diagnostics</h3>
                <div id="diagnostics">
                    <div class="stat-item">
                        <span class="stat-label">Device</span>
                        <span class="stat-value" id="diag-device">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Sentiment Model</span>
                        <span class="stat-value" id="diag-sentiment">RoBERTa-Base</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Summary Model</span>
                        <span class="stat-value" id="diag-summary">BART-Large-CNN</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Inference Time</span>
                        <span class="stat-value" id="diag-time">0ms</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="font-size: 16px; margin-bottom: 20px;">🔌 API Endpoints</h3>
                <div style="font-size: 13px; color: var(--text-dim); line-height: 1.8;">
                    <code style="color: var(--accent)">POST /predict</code><br>
                    <code style="color: var(--accent)">POST /summarize</code><br>
                    <code style="color: var(--accent)">POST /explain</code><br>
                    <code style="color: var(--accent)">GET /health</code>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load diagnostics on startup
        async function loadStats() {
            try {
                const res = await fetch('/health');
                const json = await res.json();
                if (json.success) {
                    const data = json.data;
                    document.getElementById('diag-device').textContent = data.system.device;
                    document.getElementById('device-pill').textContent = data.system.device.toUpperCase();
                    if (data.system.gpu) {
                        document.getElementById('device-pill').innerHTML = `<b>GPU:</b> ${data.system.gpu.name}`;
                    }
                }
            } catch (e) {
                console.error("Failed to load health info", e);
            }
        }
        loadStats();

        async function analyze() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return alert("Please enter some text");

            const loader = document.getElementById('analyze-loader');
            const results = document.getElementById('results');
            loader.style.display = 'block';
            results.style.display = 'none';

            try {
                const startTime = performance.now();
                
                // 1. Run Predict & Explain combined
                const explainRes = await fetch('/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texts: [text] })
                });
                const explainData = await explainRes.json();

                // 2. Run Summarize
                const summaryRes = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texts: [text] })
                });
                const summaryData = await summaryRes.json();

                const endTime = performance.now();
                document.getElementById('diag-time').textContent = `${Math.round(endTime - startTime)}ms`;

                if (explainData.success && explainData.data.length > 0) {
                    const data = explainData.data[0];
                    
                    // Show Sentiment
                    const sOut = document.getElementById('sentiment-output');
                    sOut.innerHTML = `<div class="sentiment-badge sentiment-${data.prediction.label}">${data.prediction.label}</div>`;
                    
                    const fill = document.getElementById('conf-fill');
                    fill.style.width = `${data.prediction.confidence * 100}%`;
                    document.getElementById('conf-text').textContent = `Confidence: ${(data.prediction.confidence * 100).toFixed(1)}%`;

                    // Show Explanation
                    const eOut = document.getElementById('explanation-output');
                    eOut.innerHTML = '';
                    data.explanation.tokens.forEach((token, i) => {
                        const score = data.explanation.scores[i];
                        const span = document.createElement('span');
                        span.className = 'token';
                        span.textContent = token.replace('Ġ', ' ');
                        // Highlight tokens based on attention
                        const alpha = Math.min(score * 5, 0.8); // Scale for visibility
                        span.style.backgroundColor = `rgba(99, 102, 241, ${alpha})`;
                        if (alpha > 0.4) span.style.color = 'white';
                        eOut.appendChild(span);
                    });
                }

                if (summaryData.success) {
                    document.getElementById('summary-output').textContent = summaryData.data.summary;
                }

                results.style.display = 'block';
            } catch (e) {
                alert("Error during analysis: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
</body>
</html>
